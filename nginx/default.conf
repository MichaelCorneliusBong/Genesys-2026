# ==========================================================
# HTTP -> HTTPS Redirect
# ==========================================================

server {
    listen 80;
    listen [::]:80;

    server_name genesys.genesysmeta.web.id;

    return 301 https://$host$request_uri;
}

# ==========================================================
# HTTPS Server
# ==========================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name genesys.genesysmeta.web.id;

    server_tokens off;

    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/ssl/genesys.test.crt;
    ssl_certificate_key /etc/nginx/ssl/genesys.test.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 128M;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {

        include fastcgi_params;

        fastcgi_pass php:9000;

        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Tell Laravel the original request was HTTPS
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_SSL on;

        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}